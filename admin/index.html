<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin — Timothy Bibat</title>
    <!-- Bootstrap 5.3+ for native dark mode -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: var(--bs-body-bg); }
        .login-container { min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .card { border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); border: none; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .nav-pills .nav-link.active { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection" class="login-container d-flex align-items-center justify-content-center p-3">
        <div class="card p-4 p-md-5 rounded-4 shadow-lg text-center" style="max-width: 400px; width: 100%;">
            <div class="mb-4">
                <div class="bg-primary bg-opacity-10 d-inline-flex p-3 rounded-4 mb-3">
                    <i class="fas fa-shield-halved fa-2x text-primary"></i>
                </div>
                <h2 class="fw-bold">Admin Panel</h2>
                <p class="text-secondary small">Access your portfolio dashboard</p>
            </div>
            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control rounded-3" id="adminEmail" placeholder="name@example.com" required>
                    <label for="adminEmail">Email address</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control rounded-3" id="adminPassword" placeholder="Password" required>
                    <label for="adminPassword">Password</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="d-none">
        <nav class="navbar navbar-expand-lg border-bottom sticky-top bg-body-tertiary">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                    <i class="fas fa-folder-open text-primary"></i>
                    <span>Portfolio Manager</span>
                </a>
                <button class="btn btn-outline-danger btn-sm rounded-pill px-3" id="logoutBtn">
                    <i class="fas fa-power-off me-2"></i>Logout
                </button>
            </div>
        </nav>

        <div class="container py-5">
            <div class="row g-4">
                <!-- Sidebar -->
                <div class="col-lg-3">
                    <div class="card rounded-4 p-3 sticky-top" style="top: 5rem;">
                        <button class="btn btn-primary w-100 mb-4 rounded-pill py-2" data-bs-toggle="modal" data-bs-target="#addProjectModal">
                            <i class="fas fa-plus me-2"></i>Add Project
                        </button>
                        <div class="nav flex-column nav-pills gap-2" role="tablist">
                            <a class="nav-link active rounded-3 d-flex align-items-center" data-bs-toggle="pill" href="#v-pills-activities">
                                <i class="fas fa-bolt me-3 opacity-75"></i>Activities
                            </a>
                            <a class="nav-link rounded-3 d-flex align-items-center" data-bs-toggle="pill" href="#v-pills-projects">
                                <i class="fas fa-rocket me-3 opacity-75"></i>Major Projects
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9">
                    <div class="tab-content">
                        <!-- Activities Tab -->
                        <div class="tab-pane fade show active" id="v-pills-activities">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h4 class="fw-bold mb-0">Recent Activities</h4>
                                <span class="badge bg-secondary-subtle text-secondary rounded-pill" id="activities-count">0 items</span>
                            </div>
                            <div id="admin-activities-list" class="row row-cols-1 row-cols-md-2 g-3">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                        <!-- Projects Tab -->
                        <div class="tab-pane fade" id="v-pills-projects">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h4 class="fw-bold mb-0">Major Projects</h4>
                                <span class="badge bg-secondary-subtle text-secondary rounded-pill" id="projects-count">0 items</span>
                            </div>
                            <div id="admin-projects-list" class="row row-cols-1 row-cols-md-2 g-3">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Project Modal -->
    <div class="modal fade" id="addProjectModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 shadow border-0">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Project Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="projectForm">
                        <input type="hidden" id="projectId">
                        <input type="hidden" id="pImage">
                        
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label small fw-bold">Project Name</label>
                                <input type="text" class="form-control rounded-3" id="pName" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">Category</label>
                                <select class="form-select rounded-3" id="pCategory" required>
                                    <option value="Web Design">Web Design</option>
                                    <option value="API Integration">API Integration</option>
                                    <option value="Game Development">Game Development</option>
                                    <option value="Cybersecurity">Cybersecurity</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <div class="p-4 border border-dashed rounded-4 text-center bg-body-tertiary">
                                    <i class="fas fa-cloud-upload-alt fa-2x text-primary mb-2"></i>
                                    <h6 class="mb-1 fw-bold">Upload Project Image</h6>
                                    <p class="text-secondary small mb-3">JPG, PNG or WEBP (Max 5MB)</p>
                                    <input type="file" class="form-control form-control-sm" id="pImageFile" accept="image/*">
                                    <div id="uploadProgress" class="progress mt-3 d-none" style="height: 4px;">
                                        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Description</label>
                                <textarea class="form-control rounded-3" id="pDescription" rows="3" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Live Link</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent rounded-start-3"><i class="fas fa-link small"></i></span>
                                    <input type="url" class="form-control rounded-end-3" id="pLink" placeholder="https://...">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">GitHub Repository</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent rounded-start-3"><i class="fab fa-github small"></i></span>
                                    <input type="url" class="form-control rounded-end-3" id="pGit" placeholder="https://github.com/...">
                                </div>
                            </div>
                            <div class="col-12 mt-4 pt-3 border-top">
                                <label class="form-label small fw-bold d-block mb-2">Placement</label>
                                <div class="btn-group w-100" role="group">
                                    <input type="radio" class="btn-check" name="pCollection" id="collActivities" value="activities" checked>
                                    <label class="btn btn-outline-primary rounded-start-pill" for="collActivities">Activity Collection</label>
                                    <input type="radio" class="btn-check" name="pCollection" id="collProjects" value="projects">
                                    <label class="btn btn-outline-primary rounded-end-pill" for="collProjects">Major Project Collection</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 p-4">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="projectForm" class="btn btn-primary rounded-pill px-5">Save Project</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <script src="../assets/js/firebase-config.js"></script>
    <script src="admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
