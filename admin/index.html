<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Timothy Bibat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

    <!-- Login Section -->
    <div id="loginSection" class="container d-flex align-items-center justify-content-center vh-100">
        <div class="login-card p-5 rounded-5 shadow-lg glass-effect text-center">
            <div class="mb-4">
                <div class="admin-icon mb-3">
                    <i class="fas fa-user-shield fa-3x text-primary"></i>
                </div>
                <h2 class="fw-bold">Admin Login</h2>
                <p class="text-muted">Manage your portfolio projects</p>
            </div>
            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="adminEmail" placeholder="name@example.com" required>
                    <label for="adminEmail">Email address</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="adminPassword" placeholder="Password" required>
                    <label for="adminPassword">Password</label>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-3 rounded-pill fw-bold">Login to Dashboard</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Section (Hidden by default) -->
    <div id="dashboardSection" class="container-fluid d-none py-5">
        <div class="container">
            <header class="d-flex justify-content-between align-items-center mb-5 pb-3 border-bottom">
                <div>
                    <h1 class="fw-bold mb-0">Portfolio Manager</h1>
                    <p class="text-muted">Update your projects without touching code</p>
                </div>
                <div class="d-flex gap-3">
                    <button class="btn btn-outline-danger rounded-pill px-4" id="logoutBtn">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </button>
                </div>
            </header>

            <div class="row g-4">
                <!-- Sidebar Controls -->
                <div class="col-lg-3">
                    <div class="glass-effect p-4 rounded-4 sticky-top" style="top: 2rem;">
                        <h5 class="fw-bold mb-4">Quick Actions</h5>
                        <button class="btn btn-primary w-100 mb-3 rounded-pill py-2" data-bs-toggle="modal" data-bs-target="#addProjectModal">
                            <i class="fas fa-plus me-2"></i>Add Project
                        </button>
                        <div class="list-group list-group-flush bg-transparent">
                            <a href="#activities-section" class="list-group-item bg-transparent border-0 px-0 py-2 text-primary fw-semibold">
                                <i class="fas fa-tasks me-2"></i>Activities
                            </a>
                            <a href="#projects-section" class="list-group-item bg-transparent border-0 px-0 py-2 text-muted fw-semibold">
                                <i class="fas fa-folder me-2"></i>Projects
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9">
                    <section id="activities-section" class="mb-5">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 class="fw-bold">Activities</h3>
                        </div>
                        <div id="admin-activities-list" class="row row-cols-1 row-cols-md-2 g-4">
                            <!-- Populated by JS -->
                        </div>
                    </section>

                    <section id="projects-section">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 class="fw-bold">Major Projects</h3>
                        </div>
                        <div id="admin-projects-list" class="row row-cols-1 row-cols-md-2 g-4">
                            <!-- Populated by JS -->
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Project Modal -->
    <div class="modal fade" id="addProjectModal" tabindex="-1" aria-labelledby="addProjectModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content glass-effect border-0 rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="addProjectModalLabel">Manage Project</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="projectForm">
                        <input type="hidden" id="projectId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Name</label>
                                <input type="text" class="form-control rounded-3" id="pName" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Category</label>
                                <select class="form-select rounded-3" id="pCategory" required>
                                    <option value="Web Design">Web Design</option>
                                    <option value="API Integration">API Integration</option>
                                    <option value="Game Development">Game Development</option>
                                    <option value="Mobile Development">Mobile Development</option>
                                    <option value="Cybersecurity">Cybersecurity</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Image URL</label>
                                <input type="text" class="form-control rounded-3" id="pImage" placeholder="assets/img/WD/..." required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea class="form-control rounded-3" id="pDescription" rows="3" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Live Demo Link</label>
                                <input type="text" class="form-control rounded-3" id="pLink" placeholder="https://...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">GitHub Link</label>
                                <input type="text" class="form-control rounded-3" id="pGit" placeholder="https://github.com/...">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Collection</label>
                                <div class="d-flex gap-3 mt-1">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="pCollection" id="collActivities" value="activities" checked>
                                        <label class="form-check-label" for="collActivities">Activities</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="pCollection" id="collProjects" value="projects">
                                        <label class="form-check-label" for="collProjects">Projects</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pt-0 p-4">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="projectForm" class="btn btn-primary rounded-pill px-4">Save Project</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="../assets/js/firebase-config.js"></script>
    <script src="admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
