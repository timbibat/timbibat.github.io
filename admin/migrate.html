<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Migrate Data to Firebase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-5 rounded shadow">
        <h1>Data Migration Tool</h1>
        <p>This tool will upload your current projects from <code>data.js</code> to Firebase Firestore.</p>
        <p class="text-danger fw-bold">Make sure you have updated <code>assets/js/firebase-config.js</code> with your API keys first!</p>
        
        <button id="migrateBtn" class="btn btn-primary btn-lg mt-3">Start Migration</button>
        
        <div id="status" class="mt-4"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/data.js"></script>

    <script>
        document.getElementById('migrateBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            status.innerHTML = "Starting migration...<br>";

            try {
                // Migrate Activities
                status.innerHTML += "Migrating Activities...<br>";
                for (const act of portfolioDetails.activities) {
                    await db.collection('activities').add({
                        ...act,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    status.innerHTML += `Uploaded: ${act.name}<br>`;
                }

                // Migrate Projects
                status.innerHTML += "<br>Migrating Projects...<br>";
                for (const proj of portfolioDetails.projects) {
                    await db.collection('projects').add({
                        ...proj,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    status.innerHTML += `Uploaded: ${proj.name}<br>`;
                }

                status.innerHTML += "<br><strong class='text-success'>Migration Complete!</strong> You can now delete this file.";
                document.getElementById('migrateBtn').disabled = true;
            } catch (error) {
                status.innerHTML += `<br><strong class='text-danger'>Error: ${error.message}</strong>`;
            }
        });
    </script>
</body>
</html>
