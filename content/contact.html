<div class="hero-gradient text-white p-4 p-md-5 mb-5 rounded-4 shadow position-relative overflow-hidden" id="contact">

    <div class="position-absolute top-0 end-0 w-100 h-100"
        style="background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%); animation: pulse 4s ease-in-out infinite;"></div>

    <div class="position-relative z-1">
        <div class="row align-items-center g-5">

            <div class="col-lg-6">
                <h2 class="display-6 fw-bold mb-3 text-white">
                    <i class="fas fa-paper-plane me-3"></i>Let's Connect
                </h2>

                <p class="lead mb-4 text-white" style="opacity: 0.9;">
                    I'm currently looking for new opportunities in Web Development and Security.
                    Have a project in mind? Fill out the form or send me a direct email.
                </p>

                <div class="d-flex flex-column gap-3 mb-4">
                    <div class="d-flex align-items-center">
                        <div class="p-3 rounded-circle me-3 text-white"
                            style="background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div>
                            <small class="text-white opacity-75 text-uppercase fw-bold" style="letter-spacing: 0.08em; font-size: 0.65rem;">Email Me</small>
                            <div class="fs-6 fw-bold text-white">timothybibat654@gmail.com</div>
                        </div>
                    </div>

                    <div class="d-flex align-items-center">
                        <div class="p-3 rounded-circle me-3 text-white"
                            style="background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);">
                            <i class="fab fa-linkedin-in"></i>
                        </div>
                        <div>
                            <small class="text-white opacity-75 text-uppercase fw-bold" style="letter-spacing: 0.08em; font-size: 0.65rem;">LinkedIn</small>
                            <div>
                                <a href="https://www.linkedin.com/in/timothy-bibat-5ab419182"
                                    class="text-decoration-none text-white fw-bold" style="transition: opacity 0.3s;">
                                    Connect with me
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="p-4 rounded-4 shadow-lg"
                    style="background: var(--bg-card-solid); border: 1px solid var(--glass-border);">
                    <h5 class="text-dark fw-bold mb-3">Send a Message</h5>

                    <form action="https://formspree.io/f/xnnkpwnv" method="POST">

                        <div class="mb-3">
                            <label for="name" class="form-label small fw-bold" style="color: var(--text-secondary); letter-spacing: 0.05em; font-size: 0.7rem;">YOUR NAME</label>
                            <input type="text" name="name" class="form-control py-2" id="name"
                                placeholder="John Doe" required
                                style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); color: var(--text-primary);">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold" style="color: var(--text-secondary); letter-spacing: 0.05em; font-size: 0.7rem;">EMAIL ADDRESS</label>
                            <input type="email" name="email" class="form-control py-2" id="email"
                                placeholder="name@example.com" required
                                style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); color: var(--text-primary);">
                        </div>

                        <div class="mb-3">
                            <label for="message" class="form-label small fw-bold" style="color: var(--text-secondary); letter-spacing: 0.05em; font-size: 0.7rem;">MESSAGE</label>
                            <textarea name="message" class="form-control py-2" id="message" rows="4"
                                placeholder="Hi Timothy, I'd like to discuss..." required
                                style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); color: var(--text-primary);"></textarea>
                        </div>

                        <button type="submit" class="btn btn-gradient w-100 fw-bold py-2 text-white">
                            Send Message <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="text-center small pb-4" style="color: var(--text-tertiary);">
    <p class="mb-0">&copy; <span class="current-year"></span> Timothy Bibat. Built with Bootstrap & JavaScript.</p>
</div>
