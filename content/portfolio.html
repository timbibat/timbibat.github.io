<div class="glass-card p-4 p-md-5 mb-5 border-primary border-opacity-25" id="major-project-section">
    <div class="d-flex align-items-center mb-4">
        <h2 class="mb-0 fw-bold">
            <span class="glow-text"><i class="fas fa-star me-2"></i></span>Major Project
        </h2>
        <span class="ms-3 badge rounded-pill bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 px-3 py-2">Featured</span>
    </div>
    
    <div id="major-project-container">
        <!-- Will be populated by JS -->
    </div>
</div>

<div class="glass-card p-4 p-md-5 mb-5" id="projects-section">
    <div class="section-header-toggle" onclick="toggleSection('projects-section')">
        <h2 class="mb-0 fw-bold">
            <span class="glow-text"><i class="fas fa-rocket me-2"></i></span>Projects
        </h2>
        <i class="fas fa-chevron-down section-chevron"></i>
    </div>

    <p class="text-muted mt-3 mb-4 lead">
        Here are some of my recent projects that showcase my technical skills and creativity.
    </p>

    <div class="section-collapsible">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 justify-content-center" id="projects-container">
        </div>
    </div>
</div>

<div class="glass-card p-4 p-md-5 mb-5" id="activities-section">

    <div class="section-header-toggle" onclick="toggleSection('activities-section')">
        <h2 class="mb-0 fw-bold">
            <span class="glow-text"><i class="fas fa-rocket me-2"></i></span>Activities
        </h2>
        <i class="fas fa-chevron-down section-chevron"></i>
    </div>
    
    <p class="text-muted mt-3 mb-4 lead">
        Here are some of my recent activities that showcase my involvement and contributions.
    </p>

    <div class="section-collapsible">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 justify-content-center" id="activities-container">
        </div>
    </div>
</div>

<!-- Project Detail Modal -->
<div class="modal fade" id="projectModal" tabindex="-1" aria-labelledby="projectModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content glass-card border-0 shadow-lg" style="backdrop-filter: blur(20px);">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 p-md-5 pt-2">
                <div id="modal-content-area">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>
</div>
